version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: stock-postgres
    environment:
      POSTGRES_DB: stock_data
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: changeme123
      # Increase max connections to handle multiple services
      PGUSER: stockuser
    command: >
      postgres
      -c max_connections=200
      -c shared_preload_libraries=pg_stat_statements
      -c log_statement=all
      -c log_duration=on
      -c log_connections=on
      -c log_disconnections=on
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockuser -d stock_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Stock Orchestrator
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: stock-orchestrator
    ports:
      - "8080:8080"
    environment:
      FINNHUB_TOKEN: ${FINNHUB_TOKEN}
      POLYGON_API_KEY: ${POLYGON_API_KEY}
      DATABASE_URL: postgresql://stockuser:changeme123@postgres:5432/stock_data
      QUARTERLY_STOCKS_PER_REQUEST: "1000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Stock Data Fetcher Service (Worker 1)
  data-fetcher-1:
    build:
      context: ./data_fetching_service
      dockerfile: Dockerfile
    container_name: stock-data-fetcher-1
    ports:
      - "8081:8000"
    environment:
      DATABASE_URL: postgresql://stockuser:changeme123@postgres:5432/stock_data
      ORCHESTRATOR_URL: http://orchestrator:8080
      WORKER_ID: worker-1
      POLYGON_API_KEY: ${POLYGON_API_KEY}
      STARTUP_TICKERS: "AAPL,GOOGL,MSFT,TSLA,AMZN"
      DEV: 1
    depends_on:
      postgres:
        condition: service_healthy
      orchestrator:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Quarterly Data Fetcher Service
  quarterly-data-fetcher:
    build:
      context: ./quarterly_data_fetcher
      dockerfile: Dockerfile
    container_name: stock-quarterly-data-fetcher
    ports:
      - "8082:8000"
    environment:
      DATABASE_URL: postgresql://stockuser:changeme123@postgres:5432/stock_data
      ORCHESTRATOR_URL: http://orchestrator:8080
      WORKER_ID: quarterly-worker-1
      POLYGON_API_KEY: ${POLYGON_API_KEY}
      QUARTERLY_STOCK_DELAY_SECONDS: "5"
      QUARTERLY_START_DELAY_SECONDS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      orchestrator:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Loki - Log aggregation backend
  loki:
    image: grafana/loki:latest
    container_name: stock-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # Promtail - Log collector for Docker
  promtail:
    image: grafana/promtail:latest
    container_name: stock-promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    restart: unless-stopped

  # Grafana - Visualization and querying
  grafana:
    image: grafana/grafana:latest
    container_name: stock-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  loki_data:
  grafana_data:
