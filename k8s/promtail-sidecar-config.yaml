apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-sidecar-config
  namespace: stock-data-fetchers
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
      disable: false

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.logging:3100/loki/api/v1/push

    scrape_configs:
      - job_name: app-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: app-logs
              __path__: /var/log/app/*.log
