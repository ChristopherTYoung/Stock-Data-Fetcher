apiVersion: apps/v1
kind: Deployment
metadata:
  name: quarterly-data-fetcher
  namespace: stock-data-fetchers
  labels:
    app: quarterly-data-fetcher
spec:
  replicas: 10
  selector:
    matchLabels:
      app: quarterly-data-fetcher
  template:
    metadata:
      labels:
        app: quarterly-data-fetcher
    spec:
      containers:
      - name: quarterly-data-fetcher
        image: christophertyoung/quarterly_data_fetcher:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: finnhub-secret
              key: POLYGON_API_KEY
        - name: ORCHESTRATOR_URL
          value: "http://orchestrator-service:8080"
        - name: WORKER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: QUARTERLY_STOCK_DELAY_SECONDS
          value: "15"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: log-volume
          mountPath: /var/log/app

      - name: promtail
        image: grafana/promtail:latest
        args:
          - "-config.file=/etc/promtail/promtail-config.yaml"
        volumeMounts:
        - name: promtail-config
          mountPath: /etc/promtail
        - name: log-volume
          mountPath: /var/log/app
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

      volumes:
      - name: log-volume
        emptyDir: {}
      - name: promtail-config
        configMap:
          name: promtail-sidecar-config
